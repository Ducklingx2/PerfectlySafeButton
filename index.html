<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfectly Safe Button</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            background: #111;
            color: white;
            font-family: Arial, sans-serif;

            transition: all 0.5s;
        }

        h1 {
            margin-bottom: 10px;
        }

        #message {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        #button {
            padding: 25px 60px;
            font-size: 2rem;
            border: none;
            border-radius: 12px;
            background: red;
            color: white;
            cursor: pointer;
        }

        .floating {
            position: absolute;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>Perfectly Safe Button</h1>

    <div id="message">
        Trust me, it's safe.
    </div>

    <button id="button">
        PRESS
    </button>

    <script src="script.js"></script>

</body>
</html>
